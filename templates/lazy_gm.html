<!DOCTYPE html>
<html>
<head>
   <style>
      @page {
         width: 80mm;
         height: 70mm;
         margin: 1mm;
      }

      body {
         font-family: 'monospace', monospace;
         font-size: 14px;
         line-height: 1.5;
         /* Typical thermal printer width */
         margin: 0;
         padding: 0;
      }

      h1 {
         text-align: center;
         font-size: 25px;
      }

      subtitle {
         display: block;
         font-size: 10px;
         font-weight: bold;
         margin-top: 3px;
         margin-bottom: 3px;
      }

      ul {
         list-style-type: none;
         padding: 0;
         margin: 0;
      }

      li {
         margin-bottom: 2px;
      }

      .checklist-item {
         display: inline-block;
         width: 1.2em;
         height: 1.2em;
         border: 1px solid black;
         vertical-align: middle;
         margin-right: 5px;
      }
   </style>
   
   </head>
   
   <body>
      <h1>TABLE_NAME</h1>
      <subtitle>focus: what matters most</subtitle>
      <ul>
         <li>Review each Character: </li>
         <li>Strong Start: </li>
         <li>Secrets: </li>
         <li>Clues: </li>
         <li>Fantastic Scenes/Locations: </li>
         <li>Important NPCs: </li>
         <li>Rewards: </li>
      </ul>
   </body>
   
   </html>
