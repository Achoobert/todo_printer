phrases:
  - Stop Starting, Start Finishing
  - Reduce time-to-Start
  - Ok to suck, initial discomfort
  - Do so much volume a lack of success would be unreasonable
  - Do I do what I feel like, or what I intend
  - Due today tomorrow and the next days job pull the end forward
  - Where are I rushing when I should be deliberate
  - Where am I dragging my feet when I should be moving fast
  - What has the outcome of my prior action been
  - If I could autopilot for 20 hours a week, what would that do
  - Only show work you like, or you'll end up being hired to do things you don't like.
  - What is worth trying just because of what I do along the way?
  - Learning more increases knowledge, but ONLY attempting will reduce fear. The more you try, the less you fear
